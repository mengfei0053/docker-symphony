services:
  symphony:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SYMPHONY_REPO: https://github.com/openai/symphony.git
        SYMPHONY_REF: main
        CODEX_PACKAGE: "@openai/codex"
    image: local/openai-symphony:latest
    container_name: openai-symphony
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      SYMPHONY_WORKFLOW: /config/WORKFLOW.md
      SYMPHONY_LOGS_ROOT: /data/logs
      SYMPHONY_PORT: "4000"
      SYMPHONY_WORKSPACE_ROOT: /data/workspaces
    ports:
      - "4000:4000"
    volumes:
      - ./config:/config
      - symphony-data:/data
      # Mount SSH credentials for private GitLab/GitHub repositories.
      # The entrypoint copies these into /root/.ssh to fix container-side ownership.
      - ./.ssh:/host-ssh:ro
      # Optional: persist Codex config/auth created inside the container.
      # - codex-home:/root/.codex

volumes:
  symphony-data:
  # codex-home:
